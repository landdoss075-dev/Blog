name: Daily AI Post

on:
  # Расписание GitHub-cron убрано: он ненадёжен (задержки/пропуски).
  # Запуск инициирует backend (FinMicro) через workflow_dispatch.
  # Публикация разрешена только в 07:00 UTC (10:00 МСК), чтобы выходила 1 статья в день.
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (сгенерировать без публикации)'
        type: boolean
        default: false
      force_publish:
        description: 'Force publish outside 10:00 MSK window'
        type: boolean
        default: false

# Нужно для коммита сгенерированных файлов сайта (docs/) обратно в репозиторий.
permissions:
  contents: write

# Строго по очереди: два запуска не идут параллельно, иначе оба берут устаревший
# docs/posts.json и выбирают одну тему → дубли. С concurrency следующий запуск стартует
# только после коммита предыдущего, и дедуп видит уже опубликованную статью.
concurrency:
  group: daily-post
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check publish window
        id: publish_window
        shell: bash
        run: |
          hour="$(date -u +%H)"
          if [[ "${{ inputs.dry_run }}" == "true" || "${{ inputs.force_publish }}" == "true" || "$hour" == "07" ]]; then
            echo "allowed=1" >> "$GITHUB_OUTPUT"
            echo "Публикация разрешена: dry_run=${{ inputs.dry_run }}, force=${{ inputs.force_publish }}, utc_hour=$hour"
          else
            echo "allowed=0" >> "$GITHUB_OUTPUT"
            echo "Публикация пропущена: разрешённое окно только 07:00 UTC / 10:00 МСК, сейчас utc_hour=$hour"
          fi

      - name: Run post generator
        if: steps.publish_window.outputs.allowed == '1'
        env:
          PROVIDER: ${{ vars.PROVIDER || 'openrouter' }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_MODEL: ${{ vars.GROQ_MODEL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: ${{ vars.OPENROUTER_MODEL }}
          IMAGE_PROVIDER: ${{ vars.IMAGE_PROVIDER }}
          OPENROUTER_IMAGE_MODEL: ${{ vars.OPENROUTER_IMAGE_MODEL }}
          IMAGE_ASPECT_RATIO: ${{ vars.IMAGE_ASPECT_RATIO }}
          IMAGE_RESOLUTION: ${{ vars.IMAGE_RESOLUTION }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          TELEGRAM_CHANNEL_URL: ${{ vars.TELEGRAM_CHANNEL_URL }}
          SITE_URL: ${{ vars.SITE_URL }}
          SITE_TITLE: ${{ vars.SITE_TITLE }}
          SITE_DESCRIPTION: ${{ vars.SITE_DESCRIPTION }}
          SITE_AUTHOR: ${{ vars.SITE_AUTHOR }}
          ATMO_API_URL: ${{ vars.ATMO_API_URL }}
          ATMO_INGEST_SECRET: ${{ secrets.ATMO_INGEST_SECRET }}
          DRY_RUN: ${{ inputs.dry_run && '1' || '' }}
        run: node scripts/generate_and_post.js

      - name: Commit generated site
        if: ${{ steps.publish_window.outputs.allowed == '1' && !inputs.dry_run }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs
          if git diff --staged --quiet; then
            echo "Нет изменений сайта для коммита."
          else
            git commit -m "post: новая статья $(date -u +%Y-%m-%d)"
            git push
          fi
