name: Daily Dacha Post

on:
  # 1 раз в день: 10:00 МСК (07:00 UTC).
  # Каждая публикация: Telegram «Дачные будни» + сайт/RSS.
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (сгенерировать без публикации)'
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: dacha-post
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout engine
        uses: actions/checkout@v4

      - name: Checkout dacha site repo
        uses: actions/checkout@v4
        with:
          repository: landdoss075-dev/dachnye-budni
          path: channels/dacha/docs
          ssh-key: ${{ secrets.DACHNYE_BUDNI_DEPLOY_KEY }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run dacha post generator
        env:
          PROVIDER: ${{ vars.PROVIDER || 'openrouter' }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_MODEL: ${{ vars.GROQ_MODEL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          # Та же модель, что у «Нейробудней»: Claude Sonnet 5 через OpenRouter.
          OPENROUTER_MODEL: ${{ vars.OPENROUTER_MODEL || 'anthropic/claude-sonnet-5' }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          DACHA_SITE_URL: ${{ vars.DACHA_SITE_URL }}
          DACHA_TELEGRAM_BOT_TOKEN: ${{ secrets.DACHA_TELEGRAM_BOT_TOKEN }}
          DACHA_TELEGRAM_CHANNEL_ID: ${{ vars.DACHA_TELEGRAM_CHANNEL_ID }}
          DACHA_TELEGRAM_CHANNEL_URL: ${{ vars.DACHA_TELEGRAM_CHANNEL_URL }}
          DRY_RUN: ${{ inputs.dry_run && '1' || '' }}
        run: node scripts/generate_and_post.js --niche=dacha

      - name: Commit generated dacha site
        if: ${{ !inputs.dry_run }}
        working-directory: channels/dacha/docs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --staged --quiet; then
            echo "Нет изменений сайта для коммита."
          else
            git commit -m "dacha: новая статья $(date -u +%Y-%m-%d)"
            git push
          fi
